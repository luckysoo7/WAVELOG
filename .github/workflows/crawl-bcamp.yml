name: 배캠 크롤 + 당일 매핑

on:
  # schedule 일시 중지 — YouTube 매핑 백필 완료 후 재개 예정
  workflow_dispatch:
    inputs:
      date:
        description: '날짜 (YYYY-MM-DD). 비워두면 오늘 자동 감지'
        required: false
        default: ''

# match.yml / crawl-byulbam.yml 과 동일 그룹 — YouTube API 동시 호출 방지
concurrency:
  group: youtube-api
  cancel-in-progress: false

jobs:
  crawl-and-match:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: 의존성 설치
        run: pip install -r crawler/requirements.txt

      - name: MBC 선곡표 크롤 (YouTube 없음)
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m crawler.crawl --program bcamp --date "${{ github.event.inputs.date }}"
          else
            python -m crawler.crawl --program bcamp
          fi

      - name: 당일 YouTube 매핑 (budget 2500 units)
        env:
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m crawler.match --program bcamp --budget 2500 --date "${{ github.event.inputs.date }}"
          else
            python -m crawler.match --program bcamp --budget 2500 --days 2
          fi

      - name: Last.fm 앨범 정보 보충
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m crawler.main --album-only --date "${{ github.event.inputs.date }}"
          else
            python -m crawler.main --album-only
          fi

      - name: DB 커밋 + 푸시
        run: |
          git config user.name "bcamp-daily[bot]"
          git config user.email "bcamp-daily[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: $(date +'%Y-%m-%d') 배캠 선곡표 업데이트"
          git push || (git pull --rebase && git push)

      - name: 플레이리스트 유효성 검증
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m crawler.validate

      - name: Discord 실패 알림
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ 배캠 크롤 실패",
                "description": "[워크플로우 확인](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                "color": 15158332
              }]
            }'
