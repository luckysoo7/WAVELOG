name: YouTube 백필 매핑 (배캠 + 별밤)

# YouTube 쿼터 리셋: 태평양 자정
#   PDT(4~10월): UTC-7 → 07:00 UTC 리셋
#   PST(11~3월): UTC-8 → 08:00 UTC 리셋
# 08:15 UTC = 17:15 KST — PDT/PST 양쪽 다 리셋 이후, 당일 크롤(13:20 UTC) 이전
on:
  schedule:
    - cron: '15 8 * * *'   # 17:15 KST (08:15 UTC) — PST/PDT 모두 안전
  workflow_dispatch:
    inputs:
      budget:
        description: '쿼터 예산 (units, 기본: 4500)'
        required: false
        default: '4500'
      days:
        description: '처리 범위 (일수, 기본: 90)'
        required: false
        default: '90'

concurrency:
  group: youtube-api
  cancel-in-progress: false

jobs:
  backfill-match:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: 의존성 설치
        run: pip install -r crawler/requirements.txt

      - name: 미매핑 에피소드 사전 확인
        id: check
        run: |
          COUNT=$(python3 -c "
          from crawler.db import connect, get_unmatched_episodes, DB_PATH
          conn = connect(DB_PATH)
          rows = get_unmatched_episodes(conn, max_days=${{ github.event.inputs.days || 90 }})
          conn.close()
          print(len(rows))
          ")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "처리 대상: $COUNT 개 에피소드"

      - name: YouTube 백필 매핑 (bcamp + byulbam 1:1 인터리브)
        if: steps.check.outputs.count != '0'
        env:
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python -m crawler.match \
            --budget "${{ github.event.inputs.budget || 4500 }}" \
            --days "${{ github.event.inputs.days || 90 }}"

      - name: DB 커밋 + 푸시
        if: steps.check.outputs.count != '0'
        run: |
          git config user.name "bcamp-daily[bot]"
          git config user.email "bcamp-daily[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: YouTube 백필 매핑 ($(date +'%Y-%m-%d'))"
          git push || (git pull --rebase && git push)

      - name: Discord 실패 알림
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ YouTube 백필 매핑 실패",
                "description": "[워크플로우 확인](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                "color": 15158332
              }]
            }'
