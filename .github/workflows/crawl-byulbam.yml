name: 별밤 크롤 + 당일 매핑

on:
  schedule:
    - cron: '20 15 * * *'   # 00:20 KST — 방송 종료 후
    - cron: '50 16 * * *'   # 01:50 KST — MBC 업로드 지연 대비 재시도
  workflow_dispatch:
    inputs:
      date:
        description: '날짜 (YYYY-MM-DD). 비워두면 오늘 자동 감지'
        required: false
        default: ''

concurrency:
  group: youtube-api
  cancel-in-progress: false

jobs:
  crawl-and-match:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: 의존성 설치
        run: pip install -r crawler/requirements.txt

      - name: MBC 선곡표 크롤 (YouTube 없음)
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m crawler.crawl --program byulbam --date "${{ github.event.inputs.date }}"
          else
            python -m crawler.crawl --program byulbam
          fi

      - name: 당일 YouTube 매핑 (budget 3000 units)
        env:
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m crawler.match --program byulbam --budget 3000 --date "${{ github.event.inputs.date }}"
          else
            python -m crawler.match --program byulbam --budget 3000 --days 2
          fi

      - name: DB 커밋 + 푸시
        run: |
          git config user.name "bcamp-daily[bot]"
          git config user.email "bcamp-daily[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: $(date +'%Y-%m-%d') 별밤 선곡표 업데이트"
          git push || (git pull --rebase && git push)

      - name: Discord 실패 알림
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ 별밤 크롤 실패",
                "description": "[워크플로우 확인](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                "color": 15158332
              }]
            }'
